server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location = / {
        return 301 /peek-a-bin/;
    }

    location /peek-a-bin/ {
        try_files $uri $uri/ /peek-a-bin/index.html;
    }

    location ~* \.(?:js|css|wasm|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/wasm;
    gzip_min_length 256;
}
